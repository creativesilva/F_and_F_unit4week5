<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fast & Fluent Wonders Unit 4 Week 5</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f3f4f6;
      color: #111827;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      width: min(94vw, 820px);
      min-height: min(86vh, 700px);
      background: #ffffff;
      border-radius: 24px;
      box-shadow: 0 12px 32px rgba(0,0,0,.12);
      padding: 24px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: background 0.25s ease, color 0.25s ease;
    }

    .hard-mode {
      background: #7f1d1d;
      color: #ffffff;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .pill {
      background: #e5e7eb;
      color: #111827;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 16px;
      font-weight: 700;
    }

    .hard-mode .pill {
      background: rgba(255,255,255,.18);
      color: #ffffff;
    }

    .screen {
      flex: 1;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      flex-direction: column;
      padding: 20px 8px;
    }

    .screen.active {
      display: flex;
    }

    .title {
      font-size: clamp(34px, 6vw, 64px);
      font-weight: 800;
      line-height: 1.08;
      margin-bottom: 16px;
    }

    .subtitle {
      font-size: clamp(18px, 3vw, 26px);
      opacity: .8;
      margin-bottom: 24px;
    }

    .sentence {
      font-size: clamp(28px, 5vw, 52px);
      font-weight: 700;
      line-height: 1.3;
      max-width: 700px;
      margin: 0 auto;
    }

    .mode-label {
      margin-top: 18px;
      font-size: 20px;
      font-weight: 700;
      color: #b91c1c;
      min-height: 28px;
    }

    .hard-mode .mode-label {
      color: #fecaca;
    }

    .buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 24px;
    }

    button {
      border: 0;
      border-radius: 18px;
      padding: 16px 20px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      min-width: 140px;
    }

    .start-btn,
    .done-btn {
      background: #16a34a;
      color: #ffffff;
    }

    .shuffle-btn {
      background: #f59e0b;
      color: #111827;
    }

    .reset-btn {
      background: #d1d5db;
      color: #111827;
    }

    .hard-mode .shuffle-btn {
      background: #111827;
      color: #ffffff;
      border: 2px solid #fecaca;
    }

    .result-title {
      font-size: clamp(32px, 5vw, 56px);
      font-weight: 800;
      margin-bottom: 16px;
    }

    .result-time {
      font-size: clamp(28px, 5vw, 46px);
      font-weight: 800;
      margin-bottom: 14px;
      color: #16a34a;
    }

    .hard-mode .result-time {
      color: #bbf7d0;
    }

    .result-text {
      font-size: 22px;
      line-height: 1.35;
      max-width: 620px;
      margin: 0 auto 18px auto;
    }

    .celebration-img {
      width: min(62vw, 260px);
      height: auto;
      border-radius: 20px;
      margin-top: 12px;
      box-shadow: 0 10px 28px rgba(0,0,0,.18);
      background: #fff;
    }

    .note {
      font-size: 16px;
      opacity: .75;
      margin-top: 14px;
    }
  </style>
</head>
<body>
  <div class="app" id="app">
    <div class="topbar">
      <div class="pill" id="progressPill">Sentence 0 of 10</div>
      <div class="pill" id="timerPill">00:00.0</div>
    </div>

    <div class="screen active" id="startScreen">
      <div class="title">Fast &amp; Fluent</div>
      <div class="subtitle">Wonders Unit 4 Week 5</div>
      <div class="buttons">
        <button class="start-btn" id="startBtn" type="button">Start</button>
      </div>
    </div>

    <div class="screen" id="gameScreen">
      <div class="sentence" id="sentenceText"></div>
      <div class="mode-label" id="modeLabel"></div>
      <div class="buttons">
        <button class="done-btn" id="doneBtn" type="button">Done</button>
        <button class="shuffle-btn" id="shuffleBtn" type="button">Shuffle</button>
        <button class="reset-btn" id="resetBtn" type="button">Reset</button>
      </div>
    </div>

   <div class="screen" id="finishScreen">
  <div class="result-title">You Did It, Ari!</div>
  <div class="result-time" id="finalTime">Final Time: 00:00.0</div>
  <div class="result-text">
    Congratulations, Ari! You finished all 10 sentences.
    Write this time on your sheet.
  </div>
 <img id="celebrationImg" src="https://raw.githubusercontent.com/creativesilva/F_and_F_unit4week5/refs/heads/main/Girl_Frog.png" style="width:260px;margin-top:20px;">
  <div class="buttons">
    <button class="start-btn" id="playAgainBtn" type="button">Play Again</button>
    <button class="reset-btn" id="finishResetBtn" type="button">Reset</button>
  </div>
  <div class="note">Great reading work today.</div>
</div>

  <script>
    const sentences = [
      "She lost the key to the door.",
      "Why is the road bumpy?",
      "We have a new puppy.",
      "The clown was very funny.",
      "We found a penny on the road.",
      "The beach is a sandy place.",
      "My first name is Sally.",
      "I look for stars at night.",
      "We need to wash our hands.",
      "Could you help me?"
    ];

    const celebrationImage = "ari_frog.png";

    const app = document.getElementById("app");
    const startScreen = document.getElementById("startScreen");
    const gameScreen = document.getElementById("gameScreen");
    const finishScreen = document.getElementById("finishScreen");

    const progressPill = document.getElementById("progressPill");
    const timerPill = document.getElementById("timerPill");
    const sentenceText = document.getElementById("sentenceText");
    const modeLabel = document.getElementById("modeLabel");
    const finalTime = document.getElementById("finalTime");
    const celebrationImg = document.getElementById("celebrationImg");

    const startBtn = document.getElementById("startBtn");
    const doneBtn = document.getElementById("doneBtn");
    const shuffleBtn = document.getElementById("shuffleBtn");
    const resetBtn = document.getElementById("resetBtn");
    const playAgainBtn = document.getElementById("playAgainBtn");
    const finishResetBtn = document.getElementById("finishResetBtn");

    let currentDeck = [];
    let currentIndex = 0;
    let hardMode = false;

    let timerInterval = null;
    let startTime = null;
    let elapsedMs = 0;

    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const temp = arr[i];
        arr[i] = arr[j];
        arr[j] = temp;
      }
      return arr;
    }

    function formatTime(ms) {
      const totalTenths = Math.floor(ms / 100);
      const minutes = Math.floor(totalTenths / 600);
      const seconds = Math.floor((totalTenths % 600) / 10);
      const tenths = totalTenths % 10;

      const mm = String(minutes).padStart(2, "0");
      const ss = String(seconds).padStart(2, "0");

      return `${mm}:${ss}.${tenths}`;
    }

    function updateTimer() {
      if (!startTime) return;
      elapsedMs = Date.now() - startTime;
      timerPill.textContent = formatTime(elapsedMs);
    }

    function startTimer() {
      startTime = Date.now();
      elapsedMs = 0;
      timerPill.textContent = "00:00.0";
      clearInterval(timerInterval);
      timerInterval = setInterval(updateTimer, 100);
    }

    function stopTimer() {
      clearInterval(timerInterval);
      updateTimer();
    }

    function showScreen(screen) {
      startScreen.classList.remove("active");
      gameScreen.classList.remove("active");
      finishScreen.classList.remove("active");
      screen.classList.add("active");
    }

    function updateTopBar() {
      if (gameScreen.classList.contains("active")) {
        progressPill.textContent = `Sentence ${currentIndex + 1} of ${currentDeck.length}`;
      } else if (finishScreen.classList.contains("active")) {
        progressPill.textContent = "Complete";
      } else {
        progressPill.textContent = "Sentence 0 of 10";
      }
    }

    function updateModeStyle() {
      if (hardMode) {
        app.classList.add("hard-mode");
        modeLabel.textContent = "Ultra Super Duper Hard Mode";
      } else {
        app.classList.remove("hard-mode");
        modeLabel.textContent = "";
      }
    }

    function showCurrentSentence() {
      sentenceText.textContent = currentDeck[currentIndex];
      updateTopBar();
      updateModeStyle();
    }

    function buildSequentialDeck() {
      currentDeck = [...sentences];
      currentIndex = 0;
      hardMode = false;
    }

    function buildShuffledDeck() {
      currentDeck = shuffleArray([...sentences]);
      currentIndex = 0;
      hardMode = true;
    }

    function startGame() {
      buildSequentialDeck();
      showScreen(gameScreen);
      showCurrentSentence();
      startTimer();
    }

    function advanceSentence() {
      currentIndex++;

      if (currentIndex >= currentDeck.length) {
        stopTimer();
        finalTime.textContent = `Final Time: ${formatTime(elapsedMs)}`;
        celebrationImg.src = celebrationImage;
        showScreen(finishScreen);
        updateTopBar();
        updateModeStyle();
        return;
      }

      showCurrentSentence();
    }

    function resetGame() {
      clearInterval(timerInterval);
      timerInterval = null;
      startTime = null;
      elapsedMs = 0;
      hardMode = false;
      currentDeck = [];
      currentIndex = 0;
      timerPill.textContent = "00:00.0";
      showScreen(startScreen);
      updateTopBar();
      updateModeStyle();
    }

    function shuffleMode() {
      buildShuffledDeck();
      showScreen(gameScreen);
      showCurrentSentence();
      startTimer();
    }

    startBtn.addEventListener("click", startGame);
    doneBtn.addEventListener("click", advanceSentence);
    shuffleBtn.addEventListener("click", shuffleMode);
    resetBtn.addEventListener("click", resetGame);
    playAgainBtn.addEventListener("click", startGame);
    finishResetBtn.addEventListener("click", resetGame);

    celebrationImg.src = celebrationImage;
    updateTopBar();
    updateModeStyle();
  </script>
</body>
</html>
